# ─────────────────────────────────────────────────────────────────────────────
# Share Market Daily Signal Generator — application.properties
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=sharemarket

# ── Scheduler ────────────────────────────────────────────────────────────────
# Runs daily at 21:05 UTC = 4:05 PM US-Eastern (after NYSE close).
# Crypto runs 24/7 but we piggyback on the same daily window.
# Format: sec min hour day month weekday
market.scheduler.cron=0 5 21 * * *

# Set true to run analysis once immediately on startup (useful for testing)
market.run-on-startup=false

# ── Output ────────────────────────────────────────────────────────────────────
# Excel file will be written as: {directory}/market-report-YYYY-MM-DD.xlsx
market.output.directory=./reports

# ── Symbols ───────────────────────────────────────────────────────────────────
# Top 5 crypto (Yahoo Finance tickers)
market.symbols.crypto=BTC-USD,ETH-USD,BNB-USD,SOL-USD,XRP-USD

# Stocks organised by sector — each key becomes the sector header in the Excel report
market.symbols.sectors.big-tech=AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,NFLX,ADBE,CRM
market.symbols.sectors.semiconductors=AMD,INTC,AVGO,QCOM,MU,TXN,AMAT,LRCX,KLAC,MRVL
market.symbols.sectors.financials=JPM,BAC,WFC,GS,MS,V,MA,AXP
market.symbols.sectors.consumer=WMT,COST,TGT,HD,LOW,NKE,MCD,SBUX
market.symbols.sectors.healthcare=JNJ,PFE,UNH,ABBV,MRK
market.symbols.sectors.energy=XOM,CVX,COP,SLB
market.symbols.sectors.industrial=BA,CAT,GE,UBER,PLTR

# ── Indicator Parameters ──────────────────────────────────────────────────────
market.rsi.period=14
market.rsi.ma-period=9
# Bullish start condition: blue RSI >= 40 and yellow RSI-MA >= 30
market.rsi.bullish-start-blue-min=40
market.rsi.bullish-start-yellow-min=30
# Bullish phase condition: blue RSI must be in 30..50 while above yellow
market.rsi.bullish-range-min=30
market.rsi.bullish-range-max=40
# RSI above this is considered overbought
market.rsi.overbought-level=70
# RSI above this is considered extreme overbought (short signal)
market.rsi.extreme-overbought-level=80
# RSI above this is considered critically overbought (very high reversal risk)
market.rsi.critical-overbought-level=95
# RSI below this is considered extreme oversold (strong buy watch)
market.rsi.extreme-oversold-level=25
# RSI below this is considered critically oversold (very high bounce potential)
market.rsi.critical-oversold-level=20

# Yahoo Finance historical data range and bar interval
market.data-interval=4h
market.data-range=3mo

# ── Support / Resistance ──────────────────────────────────────────────────────
# Number of recent bars used to detect the high/low range
market.support-resistance-lookback=20

# % distance from support/resistance to count as "near"
market.range-threshold-percent=3.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.sharemarket=INFO

# ─────────────────────────────────────────────────────────────────────────────
# Hourly RSI Alert System
# ─────────────────────────────────────────────────────────────────────────────

# ── Hourly alert scheduler ────────────────────────────────────────────────────
# Runs at minute 1 of every hour (gives Yahoo Finance time to close the candle)
# Format: sec min hour day month weekday
alert.scheduler.cron=0 1 * * * *

# ── Symbols to watch for RSI alerts ──────────────────────────────────────────
# Add any Yahoo Finance ticker (stocks or crypto).
# Crypto must use the -USD suffix (e.g. BTC-USD). Stocks use plain tickers.
alert.symbols=BTC-USD,ETH-USD

# ── RSI thresholds ────────────────────────────────────────────────────────────
# Alert fires when RSI crosses ABOVE this level  (overbought / potential sell)
alert.rsi.overbought=80
# Alert fires when RSI crosses BELOW this level  (oversold   / potential buy)
alert.rsi.oversold=30

# ── Cooldown ─────────────────────────────────────────────────────────────────
# Minimum hours between repeated alerts for the SAME symbol + direction.
# Prevents inbox flooding when RSI stays pinned at an extreme.
alert.cooldown-hours=4

# Minimum hours between unconditional zone update emails (pivot + S/R status).
# These always fire regardless of RSI level.
alert.zone-update-cooldown-hours=4

# ─────────────────────────────────────────────────────────────────────────────
# Gmail SMTP  (free — requires a Gmail App Password)
#
# HOW TO GET A FREE APP PASSWORD:
#   1. Go to https://myaccount.google.com/security
#   2. Enable 2-Step Verification (required)
#   3. Go to https://myaccount.google.com/apppasswords
#   4. Create an app password  →  copy the 16-character code
#   5. Paste it below (no spaces).
#
# Your real Gmail password is NEVER used or stored.
# ─────────────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_16_CHAR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Who receives the alert emails (can be same as sender or any address)
alert.email.to=YOUR_GMAIL@gmail.com
# Display name shown in the From field
alert.email.from-name=RSI Alert Bot

# ── GitHub Actions (runs even when your PC is off) ────────────────────────────
# When deployed via GitHub Actions the above mail credentials are supplied via
# GitHub Secrets and passed as -D JVM system properties at runtime, so you do
# NOT need to change this file for cloud execution.
#
# Set to true only for local one-shot testing without the scheduler.
# Set true to run one-shot check immediately on startup (used by GitHub Actions)
alert.run-on-startup=false
