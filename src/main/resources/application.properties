# ─────────────────────────────────────────────────────────────────────────────
# Share Market Daily Signal Generator — application.properties
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=sharemarket

# ── Scheduler ────────────────────────────────────────────────────────────────
# Runs daily at 21:05 UTC = 4:05 PM US-Eastern (after NYSE close).
# Crypto runs 24/7 but we piggyback on the same daily window.
# Format: sec min hour day month weekday
market.scheduler.cron=0 5 21 * * *

# Set true to run analysis once immediately on startup (useful for testing)
market.run-on-startup=false

# ── Output ────────────────────────────────────────────────────────────────────
# Excel file will be written as: {directory}/market-report-YYYY-MM-DD.xlsx
market.output.directory=./reports

# ── Symbols ───────────────────────────────────────────────────────────────────
# Top 5 crypto (Yahoo Finance tickers)
market.symbols.crypto=BTC-USD,ETH-USD,BNB-USD,SOL-USD,XRP-USD

# Stocks organised by sector — each key becomes the sector header in the Excel report
market.symbols.sectors.big-tech=AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,NFLX,ADBE,CRM
market.symbols.sectors.semiconductors=AMD,INTC,AVGO,QCOM,MU,TXN,AMAT,LRCX,KLAC,MRVL
market.symbols.sectors.financials=JPM,BAC,WFC,GS,MS,V,MA,AXP
market.symbols.sectors.consumer=WMT,COST,TGT,HD,LOW,NKE,MCD,SBUX
market.symbols.sectors.healthcare=JNJ,PFE,UNH,ABBV,MRK
market.symbols.sectors.energy=XOM,CVX,COP,SLB
market.symbols.sectors.industrial=BA,CAT,GE,UBER,PLTR

# ── Indicator Parameters ──────────────────────────────────────────────────────
market.rsi.period=14
market.rsi.ma-period=9
# Bullish start condition: blue RSI >= 40 and yellow RSI-MA >= 30
market.rsi.bullish-start-blue-min=40
market.rsi.bullish-start-yellow-min=30
# Bullish phase condition: blue RSI must be in 30..50 while above yellow
market.rsi.bullish-range-min=30
market.rsi.bullish-range-max=40
# RSI above this is considered overbought
market.rsi.overbought-level=70
# RSI above this is considered extreme overbought (short signal)
market.rsi.extreme-overbought-level=80
# RSI above this is considered critically overbought (very high reversal risk)
market.rsi.critical-overbought-level=95
# RSI below this is considered extreme oversold (strong buy watch)
market.rsi.extreme-oversold-level=25
# RSI below this is considered critically oversold (very high bounce potential)
market.rsi.critical-oversold-level=20

# Yahoo Finance historical data range and bar interval
market.data-interval=4h
market.data-range=3mo

# ── Support / Resistance ──────────────────────────────────────────────────────
# Number of recent bars used to detect the high/low range
market.support-resistance-lookback=20

# % distance from support/resistance to count as "near"
market.range-threshold-percent=3.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.sharemarket=INFO
