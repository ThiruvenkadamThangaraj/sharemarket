spring.application.name=smc-indicator-service
server.port=8081
server.shutdown=graceful
spring.mvc.problemdetails.enabled=true
spring.main.web-application-type=none

# Run report generation immediately on service startup
smc.run-on-startup=true

# Output directory for standalone SMC Excel reports
smc.output.directory=./smc-reports

# Yahoo data settings
smc.data-interval=4h
smc.data-range=3mo

# SMC settings
smc.swing-window=3
smc.range-lookback=120
smc.midpoint-avoid-percent=3.0
smc.impulse-range-lookback=20
smc.bos-strength-multiplier=1.5
smc.impulse-confirm-candles=2
smc.buy-zone-percent=15.0
smc.sell-zone-percent=15.0
smc.min-pivot-age-bars=10
smc.min-impulse-fraction=0.20

# RSI settings for bullish/bearish confirmation
smc.rsi.period=14
smc.rsi.ma-period=9

# Symbols
smc.symbols.crypto=BTC-USD,ETH-USD,BNB-USD,SOL-USD,XRP-USD
smc.symbols.sectors.big-tech=AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,NFLX,ADBE,CRM
smc.symbols.sectors.semiconductors=AMD,INTC,AVGO,QCOM,MU,TXN,AMAT,LRCX,KLAC,MRVL
smc.symbols.sectors.financials=JPM,BAC,WFC,GS,MS,V,MA,AXP
smc.symbols.sectors.consumer=WMT,COST,TGT,HD,LOW,NKE,MCD,SBUX
smc.symbols.sectors.healthcare=JNJ,PFE,UNH,ABBV,MRK
smc.symbols.sectors.energy=XOM,CVX,COP,SLB
smc.symbols.sectors.industrial=BA,CAT,GE,UBER,PLTR
