name: Hourly RSI Alert

on:
  # Runs at minute :05 of every hour, 24/7, on GitHub's servers.
  # Even if your computer is switched off, this will still fire.
  # Note: GitHub Actions cron uses UTC time.
  schedule:
    - cron: '5 * * * *'

  # Lets you trigger a manual check from the GitHub Actions tab at any time.
  workflow_dispatch:

jobs:
  rsi-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10        # Safety cap — the check normally finishes in < 2 min

    steps:
      # ── 1. Check out the code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven          # Caches ~/.m2 between runs — speeds up subsequent builds

      # ── 3. Build the jar (skip unit tests to keep it fast) ─────────────────
      - name: Build jar
        run: mvn package -q -DskipTests

      # ── 4. Run one-shot RSI alert check ─────────────────────────────────────
      # Credentials are injected from GitHub Secrets — they are NEVER stored
      # in source code or visible in logs.
      - name: Run RSI alert check
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO:      ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          java \
            -Dalert.run-on-startup=true \
            -Dmarket.run-on-startup=false \
            -Dspring.mail.username="${GMAIL_USER}" \
            -Dspring.mail.password="${GMAIL_APP_PASSWORD}" \
            -Dalert.email.to="${ALERT_EMAIL_TO}" \
            -Dalert.rsi.overbought=50 \
            -Dalert.rsi.oversold=50 \
            -jar target/sharemarket-1.0.0.jar
