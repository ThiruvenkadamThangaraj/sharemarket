spring.application.name=crypto-buy-signals-service
server.port=8091

# Framework defaults
crypto.framework.interval=4h
crypto.framework.range=1y
crypto.framework.rsi-period=14
crypto.framework.rsi-buy-threshold=40
crypto.framework.rsi-sell-threshold=70
crypto.framework.ath-discount-percent=50
crypto.framework.ma-periods=50,100,200
crypto.framework.allowed-symbols=BTC-USD,ETH-USD
crypto.report.output-directory=./crypto-reports

# Set true to run one-shot report immediately on startup (used by GitHub Actions)
crypto.run-on-startup=false

# ── Gmail SMTP ────────────────────────────────────────────────────────────────
# username and password are injected at runtime via -D (GitHub Actions secrets)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

logging.level.com.sharemarket.crypto=INFO
