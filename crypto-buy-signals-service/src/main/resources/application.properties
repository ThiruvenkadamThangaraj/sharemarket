spring.application.name=crypto-buy-signals-service
server.port=8091

# Framework defaults
crypto.framework.interval=1d
crypto.framework.range=1y
crypto.framework.rsi-period=14
crypto.framework.rsi-buy-threshold=40
crypto.framework.rsi-sell-threshold=70
crypto.framework.ath-discount-percent=50
crypto.framework.ma-periods=50,100,200
crypto.framework.allowed-symbols=BTC-USD,ETH-USD,BNB-USD,SOL-USD,XRP-USD,AAPL,MSFT,AMZN,GOOGL,META,NVDA,TSLA,NFLX,ADBE,CRM,AMD,INTC,AVGO,QCOM,MU,TXN,AMAT,LRCX,KLAC,MRVL,JPM,BAC,WFC,GS,MS,V,MA,AXP,WMT,COST,TGT,HD,LOW,NKE,MCD,SBUX,JNJ,PFE,UNH,ABBV,MRK,XOM,CVX,COP,SLB,BA,CAT,GE,UBER,PLTR
crypto.report.output-directory=./crypto-reports

logging.level.com.sharemarket.crypto=INFO
